name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger automatically when you push a tag like v1.0.0
  workflow_dispatch: # Allows you to manually click "Run workflow" in GitHub Actions tab

permissions:
  contents: write # REQUIRED to allow the action to create a Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Silences the Node20 deprecation warning


jobs:
  build:
    name: Build deb package
    # Using ubuntu-22.04 (an older LTS) to ensure the compiled 
    # binaries use an older glibc, making them compatible with almost all modern Linux distros!
    runs-on: ubuntu-22.04 
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential dpkg-dev

    - name: Build Debian Package
      run: |
        # Strip the 'v' out of the tag name (so v1.0.1 becomes 1.0.1)
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        
        # If ran manually on the main branch without a tag, fallback to snapshot
        if [[ "$TAG_VERSION" == "main" || "$TAG_VERSION" == "master" ]]; then
          TAG_VERSION="1.0.0-snapshot"
        fi
        
        make deb VERSION=$TAG_VERSION

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      # Only create an actual Release if this was triggered by a tag
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: libbenchmon.deb

    - name: Upload Artifact (for manual runs)
      uses: actions/upload-artifact@v4
      # Always upload the artifact so you can download it from the Actions tab even without a tag
      with:
        name: libbenchmon.deb
        path: libbenchmon.deb
