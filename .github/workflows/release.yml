name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build deb package
    # ubuntu-22.04 = glibc 2.35 — compatible with all modern distros
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          dpkg-dev \
          libclang-dev \
          clang

    - name: Cache Cargo registry and build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          tui/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('tui/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build TUI (Rust)
      run: |
        cd tui
        cargo build --release

    - name: Resolve version
      id: version
      run: |
        TAG="${GITHUB_REF_NAME#v}"
        if [[ "$TAG" == "main" || "$TAG" == "master" ]]; then
          TAG="1.0.0-snapshot"
        fi
        echo "value=$TAG" >> "$GITHUB_OUTPUT"

    - name: Build Debian Package
      run: make deb VERSION=${{ steps.version.outputs.value }}

    - name: Generate checksum
      run: sha256sum benchmon.deb > benchmon.deb.sha256

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          benchmon.deb
          benchmon.deb.sha256

    - name: Upload Artifact (manual runs)
      uses: actions/upload-artifact@v4
      with:
        name: benchmon-${{ steps.version.outputs.value }}
        path: |
          benchmon.deb
          benchmon.deb.sha256